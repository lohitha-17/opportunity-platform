name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install fastapi uvicorn pydantic pytest httpx sqlalchemy psycopg2-binary requests python-dotenv

    - name: Run tests
      run: pytest test_main.py -v
      env:
        DATABASE_URL: sqlite:///./test.db